# =============================================
# PostgreSQL config — tuned for local Docker
# Single student, lightweight setup
# =============================================

# Connection
listen_addresses = '*'
max_connections = 50

# Memory (optimized for local use)
shared_buffers = 128MB
effective_cache_size = 512MB
work_mem = 8MB
maintenance_work_mem = 64MB

# WAL
wal_buffers = 8MB
checkpoint_completion_target = 0.9
max_wal_size = 512MB
min_wal_size = 64MB

# Query planning
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_timezone = 'UTC'

# Locale
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
